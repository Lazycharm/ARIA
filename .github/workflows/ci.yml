name: ARIA CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies (no MetaTrader5 on Linux)
        run: |
          python -m pip install --upgrade pip
          pip install \
            pydantic pydantic-settings \
            loguru apscheduler python-dotenv requests \
            plotly dash dash-bootstrap-components \
            pandas numpy scikit-learn lightgbm optuna \
            sqlalchemy aiosqlite ta yfinance pyarrow praw \
            beautifulsoup4 lxml anthropic mlflow \
            httpx aiohttp tenacity arrow \
            fastapi uvicorn websockets \
            python-telegram-bot \
            pytest pytest-cov pytest-asyncio ruff

      - name: Lint with ruff
        run: ruff check . --select E,F,W,I --ignore E501
        continue-on-error: true

      - name: Run unit tests (mock MT5)
        env:
          ANTHROPIC_API_KEY: "test-key-ci"
          TELEGRAM_BOT_TOKEN: "test"
          TELEGRAM_CHAT_ID: "12345"
          MT5_LOGIN: "0"
          MT5_PASSWORD: "test"
          MT5_SERVER: "test"
          OBSIDIAN_VAULT_PATH: "/tmp/aria-test"
        run: |
          pytest tests/ -v --tb=short --cov=. --cov-report=term-missing \
            --ignore=tests/test_integration.py \
            -k "not lifecycle_tick"

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

  docker:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t aria-trading:${{ github.sha }} .

      - name: Test Docker image health
        run: |
          docker run --rm \
            -e MT5_LOGIN=0 -e MT5_PASSWORD=test -e MT5_SERVER=test \
            -e ANTHROPIC_API_KEY=test \
            -e TELEGRAM_BOT_TOKEN=test -e TELEGRAM_CHAT_ID=12345 \
            -e OBSIDIAN_VAULT_PATH=/tmp/aria-test \
            aria-trading:${{ github.sha }} \
            python -c "from config.settings import settings; print('Config OK')"
